# Build Engineer — dev build speed (Windows + Linux)
# https://bevyengine.org/learn/quick-start/getting-started/setup/

[build]
incremental = true

[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[alias]
run-dev = "run --features dev_fast"
run-hot = "run --features dev_fast,dev_hot_reload"
